name: Secure CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for SonarCloud

      # 1. SonarCloud Analysis
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=IIIT-n-HA_Frontend
            -Dsonar.organization=iiit-n-ha
            -Dsonar.sources=.
            -Dsonar.host.url=https://sonarcloud.io

      # 2. SNYK Security Scan
      # 1. Install dependencies so Snyk can see the full dependency tree
      - name: Install Dependencies
        run: npm install

      # 2. Run Snyk to check for vulnerabilities in those dependencies
      - name: Snyk Security Scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=low # This ensures it catches everything for our report
          command: monitor # This pushes the results to your Snyk.io dashboard for Task 8
